<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KINETICS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#09090b;color:#fafafa;font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#27272a;border-radius:4px;}

#topbar{height:56px;background:#09090b;border-bottom:1px solid #27272a;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:#e4e4e7;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.logo-name{font-family:'Playfair Display',serif;font-size:16px;color:#fafafa;font-weight:700;}
.logo-sep{width:1px;height:18px;background:#27272a;margin:0 2px;flex-shrink:0;}
.logo-tag{font-size:10px;color:#52525b;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
#clock{font-family:'DM Mono',monospace;font-size:15px;color:#a1a1aa;font-weight:500;letter-spacing:0.5px;}
.live-pill{display:flex;align-items:center;gap:5px;background:#18181b;border:1px solid #3f3f46;border-radius:20px;padding:4px 10px;font-size:11px;color:#71717a;white-space:nowrap;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;flex-shrink:0;}
#refresh-btn{width:34px;height:34px;border-radius:8px;border:1px solid #27272a;background:#18181b;cursor:pointer;color:#52525b;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.2s;flex-shrink:0;}
#refresh-btn:hover{background:#27272a;color:#a1a1aa;}

.page{padding:16px;max-width:1400px;margin:0 auto;}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:#18181b;border:1px solid #27272a;border-radius:14px;padding:16px;position:relative;overflow:hidden;transition:border-color 0.2s;}
.stat-card:hover{border-color:#3f3f46;}
.stat-accent{position:absolute;top:0;left:0;right:0;height:1px;}
.stat-icon{font-size:18px;margin-bottom:8px;display:block;}
.stat-label{font-size:9px;color:#52525b;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:6px;}
.stat-value{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;line-height:1;color:#fafafa;}
.stat-sub{font-size:11px;color:#3f3f46;margin-top:6px;line-height:1.4;}
.stat-bar{height:1px;background:#27272a;border-radius:99px;margin-top:14px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease;}

.tab-bar{display:flex;gap:0;background:#18181b;border:1px solid #27272a;border-radius:12px;padding:3px;margin-bottom:16px;}
.tab-btn{flex:1;padding:8px 6px;border-radius:10px;border:none;background:transparent;font-size:12px;cursor:pointer;color:#52525b;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.2s;text-align:center;}
.tab-btn.active{background:#27272a;color:#fafafa;}

.panel{display:none;}
.panel.active{display:block;}

.card{background:#18181b;border:1px solid #27272a;border-radius:14px;overflow:hidden;margin-bottom:12px;}
.card:last-child{margin-bottom:0;}
.card-header{padding:14px 16px;border-bottom:1px solid #27272a;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:10px;font-weight:600;color:#52525b;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.card-badge{font-size:11px;color:#71717a;background:#27272a;border:1px solid #3f3f46;padding:3px 8px;border-radius:20px;}

.next-wrap{padding:14px 16px;}
.next-card{background:#09090b;border:1px solid #3f3f46;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.next-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#3f3f46,transparent);}
.next-avatar{width:46px;height:46px;border-radius:12px;flex-shrink:0;background:#27272a;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#a1a1aa;font-family:'DM Mono',monospace;border:1px solid #3f3f46;}
.next-meta{flex:1;min-width:0;}
.next-eyebrow{font-size:9px;color:#3f3f46;letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:3px;}
.next-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#fafafa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.next-detail{font-size:11px;color:#52525b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.next-time-block{text-align:right;flex-shrink:0;}
.next-time{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:#e4e4e7;line-height:1;}
.next-min{font-size:10px;color:#3f3f46;margin-top:3px;}

.prog-item{padding:12px 16px;border-bottom:1px solid #27272a;display:flex;align-items:center;gap:10px;transition:background 0.15s;}
.prog-item:last-child{border-bottom:none;}
.prog-item:hover{background:#27272a20;}
.prog-item.trecut{opacity:0.25;}
.prog-item.acum{background:#27272a;border-left:1px solid #52525b;}
.prog-time{font-family:'DM Mono',monospace;font-size:13px;color:#52525b;min-width:40px;flex-shrink:0;}
.prog-time.now{color:#e4e4e7;font-weight:600;}
.prog-avatar{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;}
.prog-info{flex:1;min-width:0;}
.prog-name{font-size:13px;font-weight:500;color:#e4e4e7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prog-diag{font-size:11px;color:#3f3f46;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.chip-fizio{background:#1e1b4b;color:#818cf8;border:1px solid #312e81;}
.chip-kineto{background:#1a0c3a;color:#c4b5fd;border:1px solid #2e1065;}
.chip-eval{background:#0c2a1e;color:#6ee7b7;border:1px solid #064e3b;}
.chip-now{background:#27272a;color:#e4e4e7;border:1px solid #52525b;}

.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px;}
.week-stat{background:#09090b;border:1px solid #27272a;border-radius:10px;padding:12px 14px;transition:border-color 0.2s;}
.week-stat:hover{border-color:#3f3f46;}
.week-icon{font-size:14px;margin-bottom:4px;display:block;}
.week-label{font-size:9px;color:#3f3f46;letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:3px;}
.week-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#fafafa;}

.chart-section{padding:0 16px 14px;}
.chart-title{font-size:9px;color:#3f3f46;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:10px;}
.days-row{display:flex;gap:6px;align-items:flex-end;height:70px;}
.day-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;}
.day-bar-wrap{flex:1;display:flex;align-items:flex-end;width:100%;}
.day-bar{width:100%;border-radius:5px 5px 0 0;background:#27272a;min-height:4px;transition:height 0.5s cubic-bezier(0.16,1,0.3,1);}
.day-bar.has{background:#3f3f46;}
.day-bar.today{background:#e4e4e7;}
.day-label{font-size:8px;color:#3f3f46;font-family:'DM Mono',monospace;margin-top:5px;}
.day-label.today{color:#e4e4e7;font-weight:600;}
.day-count{font-size:9px;font-family:'DM Mono',monospace;color:#3f3f46;margin-top:1px;}
.day-count.today{color:#e4e4e7;font-weight:600;}

.pie-section{padding:0 16px 16px;}
.pie-bar{height:6px;border-radius:99px;overflow:hidden;display:flex;background:#27272a;}
.pie-new{background:#e4e4e7;height:100%;transition:width 0.5s ease;}
.pie-rec{background:#52525b;height:100%;transition:width 0.5s ease;}
.pie-legend{display:flex;gap:14px;margin-top:10px;}
.pie-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#52525b;}
.pie-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

.divider{height:1px;background:#27272a;}
.empty{padding:28px;text-align:center;color:#27272a;font-size:13px;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.stat-card{animation:fadeUp 0.35s ease both;}
.stat-card:nth-child(1){animation-delay:0.04s;}
.stat-card:nth-child(2){animation-delay:0.08s;}
.stat-card:nth-child(3){animation-delay:0.12s;}
.stat-card:nth-child(4){animation-delay:0.16s;}

@media(min-width:768px){
  #topbar{height:64px;padding:0 28px;gap:20px;}
  .logo-icon{width:36px;height:36px;font-size:16px;}
  .logo-name{font-size:18px;}
  #clock{font-size:17px;}
  #refresh-btn{width:auto;padding:8px 16px;font-size:12px;border-radius:10px;}
  #refresh-btn::after{content:' Refresh';}
  .page{padding:28px;}
  .stats-grid{grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{padding:22px 24px;border-radius:18px;}
  .stat-value{font-size:44px;}
  .tab-bar{display:none;}
  .panel{display:block!important;}
  .desktop-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;}
  .card{border-radius:18px;margin-bottom:20px;}
  .card-header{padding:16px 22px;}
  .next-wrap{padding:18px 22px;}
  .next-avatar{width:52px;height:52px;font-size:16px;}
  .next-name{font-size:20px;}
  .next-time{font-size:32px;}
  .prog-item{padding:13px 22px;}
  .week-grid{padding:18px 22px;gap:10px;}
  .week-val{font-size:30px;}
  .chart-section{padding:0 22px 18px;}
  .pie-section{padding:0 22px 20px;}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">
    <div class="logo-icon" style="background:#18181b;border:1px solid #3f3f46;padding:0;">
      <svg width="22" height="22" viewBox="0 0 26 26" fill="none">
        <rect x="5" y="4" width="4" height="18" rx="1" fill="#e4e4e7"/>
        <path d="M9 13 L20 4" stroke="#e4e4e7" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M9 13 L20 22" stroke="#e4e4e7" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-name">Kinetics</div>
    <div class="logo-sep"></div>
    <div class="logo-tag">Dashboard</div>
  </div>
  <div class="topbar-right">
    <div class="live-pill"><div class="live-dot"></div>Live</div>
    <div id="clock">00:00</div>
    <button id="refresh-btn" onclick="loadData()">
      <span id="ref-icon" style="display:inline-block">↻</span>
    </button>
  </div>
</div>

<div class="page">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-accent" style="background:#52525b"></div>
      <span class="stat-icon">📅</span>
      <div class="stat-label">Azi</div>
      <div class="stat-value" id="s-azi">—</div>
      <div class="stat-sub" id="s-azi-sub">programări</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="s-azi-bar" style="width:0%;background:#e4e4e7"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-accent" style="background:#3f3f46"></div>
      <span class="stat-icon">✨</span>
      <div class="stat-label">Noi</div>
      <div class="stat-value" id="s-noi">—</div>
      <div class="stat-sub">această săpt.</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="s-noi-bar" style="width:0%;background:#71717a"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-accent" style="background:#3f3f46"></div>
      <span class="stat-icon">🔄</span>
      <div class="stat-label">Recurenți</div>
      <div class="stat-value" id="s-rec">—</div>
      <div class="stat-sub" id="s-rec-sub">din total</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="s-rec-bar" style="width:0%;background:#52525b"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-accent" style="background:#3f3f46"></div>
      <span class="stat-icon">⚠️</span>
      <div class="stat-label">Urgențe</div>
      <div class="stat-value" id="s-urg">—</div>
      <div class="stat-sub">în CRM</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="s-urg-bar" style="width:4%;background:#71717a"></div></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="setTab('azi')">📅 Azi</button>
    <button class="tab-btn" onclick="setTab('sapt')">📊 Săptămână</button>
    <button class="tab-btn" onclick="setTab('pacienti')">👥 Pacienți</button>
  </div>

  <div class="desktop-grid">
    <div class="panel active" id="panel-azi">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Programări de azi</span>
          <span class="card-badge" id="prog-count">0</span>
        </div>
        <div id="next-wrap"></div>
        <div class="divider"></div>
        <div id="prog-list"><div class="empty">Se încarcă...</div></div>
      </div>
    </div>

    <div>
      <div class="panel active" id="panel-sapt">
        <div class="card">
          <div class="card-header"><span class="card-title">Săptămâna aceasta</span></div>
          <div class="week-grid">
            <div class="week-stat"><span class="week-icon">📊</span><div class="week-label">Total</div><div class="week-val" id="w-total">—</div></div>
            <div class="week-stat"><span class="week-icon">📋</span><div class="week-label">Evaluări</div><div class="week-val" id="w-eval">—</div></div>
            <div class="week-stat"><span class="week-icon">💆</span><div class="week-label">Fizioterapie</div><div class="week-val" id="w-fizio">—</div></div>
            <div class="week-stat"><span class="week-icon">🏃</span><div class="week-label">Kinetoterapie</div><div class="week-val" id="w-kineto">—</div></div>
          </div>
          <div class="chart-section">
            <div class="chart-title">Distribuție pe zile</div>
            <div class="days-row" id="days-row"></div>
          </div>
        </div>
      </div>

      <div class="panel active" id="panel-pacienti">
        <div class="card">
          <div class="card-header"><span class="card-title">Noi vs Recurenți</span></div>
          <div class="pie-section" style="padding-top:16px;">
            <div class="pie-bar" id="pie-bar">
              <div class="pie-new" style="width:50%"></div>
              <div class="pie-rec" style="width:50%"></div>
            </div>
            <div class="pie-legend">
              <div class="pie-item"><div class="pie-dot" style="background:#e4e4e7"></div><span id="pie-new-label">Noi: —</span></div>
              <div class="pie-item"><div class="pie-dot" style="background:#52525b"></div><span id="pie-rec-label">Recurenți: —</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API=window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1"?"https://vapi-webhook-pcnp.onrender.com":"";

function setTab(tab){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.classList.toggle("active",["azi","sapt","pacienti"][i]===tab);
  });
  ["azi","sapt","pacienti"].forEach(t=>{
    const el=document.getElementById(`panel-${t}`);
    if(el)el.classList.toggle("active",t===tab);
  });
}

function initiale(n){return(n||"?").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();}

function avatarStyle(tip){
  if(tip==="kinetoterapie")return"background:#1a0c3a;color:#c4b5fd";
  if(tip==="evaluare")return"background:#0c2a1e;color:#6ee7b7";
  return"background:#1e1b4b;color:#818cf8";
}

function chipFor(tip){
  if(tip==="kinetoterapie")return`<span class="chip chip-kineto">Kineto</span>`;
  if(tip==="evaluare")return`<span class="chip chip-eval">Evaluare</span>`;
  return`<span class="chip chip-fizio">Fizio</span>`;
}

function updateClock(){
  const now=new Date();const pad=n=>String(n).padStart(2,"0");
  document.getElementById("clock").textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
setInterval(updateClock,1000);updateClock();

async function loadData(){
  const icon=document.getElementById("ref-icon");
  icon.style.animation="spin 0.8s linear infinite";
  try{
    const res=await fetch(`${API}/pacienti`);
    const pacienti=await res.json();
    const now=new Date();
    const azi=now.toISOString().split("T")[0];
    const pad=n=>String(n).padStart(2,"0");
    const nowHHMM=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const dow=now.getDay();
    const monday=new Date(now);monday.setDate(now.getDate()-(dow===0?6:dow-1));monday.setHours(0,0,0,0);
    const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);

    const progAzi=pacienti.filter(p=>(p.appointment_datetime||"").split("T")[0]===azi).sort((a,b)=>(a.appointment_datetime||"").localeCompare(b.appointment_datetime||""));
    const progSapt=pacienti.filter(p=>{const d=new Date(p.appointment_datetime||0);return d>=monday&&d<=sunday;});
    const telefoneSapt=new Set(progSapt.map(p=>p.telefon));
    const nouiCount=[...telefoneSapt].filter(t=>pacienti.filter(p=>p.telefon===t).length===1).length;
    const recurentiCount=pacienti.length-nouiCount;
    const urgente=pacienti.filter(p=>p.urgent).length;
    const maxStat=Math.max(progAzi.length,nouiCount,recurentiCount,urgente,1);

    document.getElementById("s-azi").textContent=progAzi.length;
    document.getElementById("s-azi-sub").textContent=`${progAzi.filter(p=>(p.tip_serviciu||"")==="evaluare").length} evaluări`;
    document.getElementById("s-azi-bar").style.width=`${Math.round((progAzi.length/maxStat)*100)}%`;
    document.getElementById("s-noi").textContent=nouiCount;
    document.getElementById("s-noi-bar").style.width=`${Math.round((nouiCount/maxStat)*100)}%`;
    document.getElementById("s-rec").textContent=recurentiCount;
    document.getElementById("s-rec-sub").textContent=`din ${pacienti.length}`;
    document.getElementById("s-rec-bar").style.width=`${Math.round((recurentiCount/maxStat)*100)}%`;
    document.getElementById("s-urg").textContent=urgente;
    document.getElementById("s-urg-bar").style.width=urgente>0?`${Math.round((urgente/maxStat)*100)}%`:"4%";

    document.getElementById("w-total").textContent=progSapt.length;
    document.getElementById("w-eval").textContent=progSapt.filter(p=>(p.tip_serviciu||"")==="evaluare").length;
    document.getElementById("w-fizio").textContent=progSapt.filter(p=>(p.tip_serviciu||"fizioterapie")==="fizioterapie").length;
    document.getElementById("w-kineto").textContent=progSapt.filter(p=>(p.tip_serviciu||"")==="kinetoterapie").length;

    const countPerDay=[0,0,0,0,0,0,0];
    progSapt.forEach(p=>{const d=new Date(p.appointment_datetime||0);const idx=d.getDay()===0?6:d.getDay()-1;countPerDay[idx]++;});
    const maxDay=Math.max(...countPerDay,1);
    const todayIdx=dow===0?6:dow-1;
    const dayLabels=["L","M","M","J","V","S","D"];
    document.getElementById("days-row").innerHTML=countPerDay.map((c,i)=>`
      <div class="day-col">
        <div class="day-bar-wrap"><div class="day-bar ${i===todayIdx?'today':''} ${c>0?'has':''}" style="height:${Math.round((c/maxDay)*56)+4}px"></div></div>
        <div class="day-label ${i===todayIdx?'today':''}">${dayLabels[i]}</div>
        <div class="day-count ${i===todayIdx?'today':''}">${c||''}</div>
      </div>`).join("");

    const total=Math.max(nouiCount+recurentiCount,1);
    const pn=Math.round((nouiCount/total)*100);
    document.getElementById("pie-bar").innerHTML=`<div class="pie-new" style="width:${pn}%"></div><div class="pie-rec" style="width:${100-pn}%"></div>`;
    document.getElementById("pie-new-label").textContent=`Noi: ${nouiCount} (${pn}%)`;
    document.getElementById("pie-rec-label").textContent=`Recurenți: ${recurentiCount} (${100-pn}%)`;

    document.getElementById("prog-count").textContent=progAzi.length;
    const urmator=progAzi.find(p=>new Date(p.appointment_datetime||0).getTime()>now.getTime());
    if(urmator){
      const ora=(urmator.appointment_datetime||"").match(/T(\d{2}:\d{2})/)?.[1]||"—";
      const min=Math.round((new Date(urmator.appointment_datetime).getTime()-now.getTime())/60000);
      document.getElementById("next-wrap").innerHTML=`<div class="next-wrap"><div class="next-card">
        <div class="next-avatar">${initiale(urmator.nume)}</div>
        <div class="next-meta">
          <div class="next-eyebrow">Urmează</div>
          <div class="next-name">${urmator.nume}</div>
          <div class="next-detail">${urmator.diagnostic||'—'} · ${urmator.tip_serviciu||'fizioterapie'}</div>
        </div>
        <div class="next-time-block">
          <div class="next-time">${ora}</div>
          <div class="next-min">în ${min} min</div>
        </div>
      </div></div>`;
    } else {
      document.getElementById("next-wrap").innerHTML="";
    }

    if(progAzi.length===0){
      document.getElementById("prog-list").innerHTML=`<div class="empty">Nicio programare pentru azi</div>`;
    } else {
      document.getElementById("prog-list").innerHTML=progAzi.map(p=>{
        const ora=(p.appointment_datetime||"").match(/T(\d{2}:\d{2})/)?.[1]||"—";
        const trecut=ora<nowHHMM;
        const acum=!trecut&&ora<=nowHHMM;
        const tip=p.tip_serviciu||"fizioterapie";
        return`<div class="prog-item ${trecut?'trecut':''} ${acum&&!trecut?'acum':''}">
          <div class="prog-time ${acum&&!trecut?'now':''}">${ora}</div>
          <div class="prog-avatar" style="${avatarStyle(tip)}">${initiale(p.nume)}</div>
          <div class="prog-info">
            <div class="prog-name">${p.nume}</div>
            <div class="prog-diag">${p.diagnostic||'—'}</div>
          </div>
          ${chipFor(tip)}
          ${acum&&!trecut?'<span class="chip chip-now">Acum</span>':''}
        </div>`;
      }).join("");
    }
  }catch(e){
    document.getElementById("prog-list").innerHTML=`<div class="empty" style="color:#ef4444">Eroare: ${e.message}</div>`;
  }
  icon.style.animation="";
}

loadData();
setInterval(loadData,60000);
</script>
</body>
</html>
