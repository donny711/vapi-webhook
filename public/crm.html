<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KINETICS — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#09090b;color:#fafafa;font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#27272a;border-radius:4px;}
input,textarea,button{font-family:'DM Sans',sans-serif;}input:focus,textarea:focus{outline:none;}
#topbar{height:56px;background:#09090b;border-bottom:1px solid #27272a;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;position:relative;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:#18181b;border:1px solid #3f3f46;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-family:'Playfair Display',serif;font-size:16px;color:#fafafa;font-weight:700;}
.logo-sep{width:1px;height:18px;background:#27272a;margin:0 2px;flex-shrink:0;}
.logo-tag{font-size:10px;color:#52525b;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
#stats{margin-left:auto;font-size:11px;color:#3f3f46;display:none;}
#service-tabs{display:flex;gap:0;padding:10px 16px 0;background:#09090b;border-bottom:1px solid #27272a;flex-shrink:0;}
.stab{flex:1;padding:8px 4px;border:none;background:transparent;font-size:12px;cursor:pointer;color:#52525b;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'DM Sans',sans-serif;font-weight:500;text-align:center;}
.stab:hover{color:#71717a;}
.stab.active{color:#e4e4e7;border-bottom-color:#e4e4e7;}
#main{flex:1;display:flex;overflow:hidden;}
#sidebar{width:100%;display:flex;flex-direction:column;background:#09090b;flex-shrink:0;}
#search-wrap{padding:12px 12px 8px;}
#search{width:100%;padding:10px 14px;border-radius:10px;background:#18181b;border:1px solid #27272a;color:#e4e4e7;font-size:14px;}
#search::placeholder{color:#3f3f46;}
#search:focus{border-color:#52525b;}
#filters{display:flex;gap:6px;padding:0 12px 10px;}
.filter-btn{flex:1;padding:6px 0;border-radius:8px;font-size:11px;cursor:pointer;border:1px solid #27272a;background:#18181b;color:#52525b;font-weight:500;transition:all 0.2s;}
.filter-btn.active{border-color:#52525b;background:#27272a;color:#e4e4e7;}
#list{flex:1;overflow-y:auto;padding:0 8px 80px;}
.pac-card{padding:13px 14px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:11px;margin-bottom:4px;}
.pac-card:hover{background:#18181b;}
.pac-card:active{transform:scale(0.98);}
.pac-card.active{background:#18181b;border-color:#27272a;}
.avatar{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:#27272a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#71717a;font-family:'DM Mono',monospace;letter-spacing:1px;}
.pac-info{flex:1;min-width:0;}
.pac-name{font-size:14px;font-weight:600;color:#e4e4e7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pac-diag{font-size:11px;color:#3f3f46;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#back-btn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;background:#27272a;color:#e4e4e7;border:1px solid #3f3f46;border-radius:20px;padding:10px 20px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;}
#content{flex:1;overflow-y:auto;background:#09090b;display:none;}
#profil{padding:16px 16px 100px;}
.profil-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;background:#18181b;border:1px solid #27272a;border-radius:14px;padding:16px;}
.avatar-lg{width:52px;height:52px;border-radius:12px;flex-shrink:0;background:#27272a;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#71717a;font-family:'DM Mono',monospace;border:1px solid #3f3f46;}
.profil-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fafafa;margin-bottom:4px;}
.profil-sub{font-size:12px;color:#3f3f46;margin-bottom:8px;}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;display:inline-block;margin-right:6px;margin-bottom:4px;}
.card{background:#18181b;border:1px solid #27272a;border-radius:14px;padding:16px;margin-bottom:12px;}
.card-label{font-size:10px;color:#52525b;margin-bottom:10px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;}
.card-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sedinte-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sedinte-num{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;}
.progress-bar{height:2px;background:#27272a;border-radius:99px;overflow:hidden;margin-bottom:14px;}
.progress-fill{height:100%;border-radius:99px;}
.btn-row{display:flex;gap:8px;}
.btn-sm{flex:1;padding:10px 0;border-radius:10px;border:1px solid #27272a;background:#27272a;color:#e4e4e7;font-size:20px;cursor:pointer;transition:all 0.15s;}
.btn-sm:hover{background:#3f3f46;}
.btn-sm:active{transform:scale(0.97);}
.prog-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-data{font-size:13px;color:#a1a1aa;}
.prog-ora{font-size:13px;color:#71717a;font-family:'DM Mono',monospace;}
.note-text{font-size:13px;color:#52525b;line-height:1.7;}
.note-edit{width:100%;background:#27272a;border:1px solid #3f3f46;border-radius:10px;padding:12px;color:#e4e4e7;font-size:14px;line-height:1.7;resize:vertical;min-height:100px;}
.note-edit:focus{border-color:#52525b;}
.btn-edit{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #27272a;background:#27272a;color:#71717a;cursor:pointer;}
.btn-edit:hover{color:#a1a1aa;}
.urgent-toggle{display:flex;align-items:center;gap:12px;background:#18181b;border:1px solid #27272a;border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:all 0.2s;}
.urgent-toggle.on{border-color:#71717a;background:#27272a;}
.toggle-switch{width:44px;height:24px;border-radius:99px;background:#27272a;position:relative;flex-shrink:0;transition:background 0.2s;}
.toggle-switch.on{background:#52525b;}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:#71717a;position:absolute;top:3px;left:3px;transition:left 0.2s;}
.toggle-switch.on .toggle-knob{left:23px;background:#e4e4e7;}
.urgent-label{font-size:13px;font-weight:600;color:#3f3f46;}
.urgent-toggle.on .urgent-label{color:#a1a1aa;}
.tip-selector{display:flex;gap:6px;margin-bottom:12px;}
.tip-btn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid #27272a;background:#18181b;color:#3f3f46;font-size:11px;cursor:pointer;font-weight:500;transition:all 0.2s;text-align:center;}
.tip-btn:hover{border-color:#3f3f46;color:#71717a;}
.tip-btn.active-fizio{border-color:#312e81;background:#1e1b4b;color:#818cf8;}
.tip-btn.active-kineto{border-color:#2e1065;background:#1a0c3a;color:#c4b5fd;}
.tip-btn.active-evaluare{border-color:#064e3b;background:#0c2a1e;color:#6ee7b7;}
#btn-save{width:100%;padding:14px 0;border-radius:12px;border:1px solid #3f3f46;background:#27272a;color:#e4e4e7;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s;margin-top:4px;}
#btn-save:hover{background:#3f3f46;}
#btn-save.saved{background:#052e16;color:#22c55e;border-color:#166534;}
#btn-save:active{transform:scale(0.98);}
#empty{display:flex;align-items:center;justify-content:center;height:100%;color:#27272a;font-size:14px;}
@media(min-width:768px){
  body{overflow:hidden;}
  #topbar{height:56px;padding:0 24px;}
  #stats{display:block;}
  #service-tabs{padding:0 24px;}
  .stab{padding:14px 20px;font-size:13px;}
  #sidebar{width:300px;border-right:1px solid #27272a;}
  #search-wrap{padding:14px 14px 8px;}
  #list{padding:0 8px 16px;}
  #back-btn{display:none!important;}
  #content{display:flex!important;flex-direction:column;}
  #empty{display:flex;}
}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 26 26" fill="none">
        <rect x="5" y="4" width="4" height="18" rx="1" fill="#e4e4e7"/>
        <path d="M9 13 L20 4" stroke="#e4e4e7" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M9 13 L20 22" stroke="#e4e4e7" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-name">Kinetics</div>
    <div class="logo-sep"></div>
    <div class="logo-tag">CRM</div>
  </div>
  <div id="stats">Se încarcă...</div>
</div>
<div id="service-tabs">
  <button class="stab active" data-tip="fizioterapie" onclick="setTab('fizioterapie')">💆 Fizioterapie</button>
  <button class="stab" data-tip="kinetoterapie" onclick="setTab('kinetoterapie')">🏃 Kinetoterapie</button>
  <button class="stab" data-tip="evaluare" onclick="setTab('evaluare')">📋 Evaluări</button>
</div>
<div id="main">
  <div id="sidebar">
    <div id="search-wrap"><input id="search" placeholder="Caută pacient..." oninput="render()"></div>
    <div id="filters">
      <button class="filter-btn active" data-f="toti" onclick="setFilter('toti')">Toți</button>
      <button class="filter-btn" data-f="urgent" onclick="setFilter('urgent')">⚠ Urgent</button>
      <button class="filter-btn" data-f="finalizat" onclick="setFilter('finalizat')">✓ Finalizat</button>
    </div>
    <div id="list"><div style="text-align:center;color:#27272a;padding:20px;font-size:13px">Se încarcă...</div></div>
  </div>
  <div id="content"><div id="empty">Selectează un pacient</div></div>
</div>
<button id="back-btn" onclick="goBack()">← Înapoi</button>
<script>
const API=window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1"?"https://vapi-webhook-pcnp.onrender.com":"";
const isMobile=()=>window.innerWidth<768;
let pacienti=[],programariCache={},selectedTelefon=null,filterVal="toti",tabVal="fizioterapie",editNote=false,localState={};

function initiale(n){return(n||"?").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();}
function dotColor(sr){return sr===0?"#ef4444":sr<=3?"#f59e0b":"#22c55e";}

// FIX: parsează corect boolean din Sheets (vine ca string "true"/"false")
function parseBool(val){
  if(typeof val==="boolean")return val;
  if(typeof val==="string")return val.toLowerCase()==="true";
  return false;
}

async function loadPacienti(){
  try{
    const res=await fetch(`${API}/pacienti`);
    const raw=await res.json();
    // normalizează urgent ca boolean la încărcare
    pacienti=raw.map(p=>({...p,urgent:parseBool(p.urgent)}));
    const first=pacienti.find(p=>(p.tip_serviciu||"fizioterapie")===tabVal);
    if(first){selectedTelefon=first.telefon;loadProgramari(first.telefon);}
    render();
  }catch(e){document.getElementById("list").innerHTML=`<div style="color:#ef4444;padding:16px;font-size:13px">Eroare: ${e.message}</div>`;}
}

async function loadProgramari(telefon){
  if(programariCache[telefon])return;
  try{const res=await fetch(`${API}/pacienti/${encodeURIComponent(telefon)}`);programariCache[telefon]=await res.json();if(selectedTelefon===telefon)renderProfil();}
  catch(e){programariCache[telefon]=[];}
}

function setTab(t){
  tabVal=t;
  document.querySelectorAll(".stab").forEach(b=>b.classList.toggle("active",b.dataset.tip===t));
  const first=pacienti.find(p=>(getLocal(p,"tip_serviciu")||"fizioterapie")===t&&!getLocal(p,"urgent"));
  selectedTelefon=first?first.telefon:null;
  editNote=false;
  if(isMobile())showSidebar();
  render();
  if(selectedTelefon)loadProgramari(selectedTelefon);
}

function setFilter(f){filterVal=f;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.f===f));render();}

function selectPacient(telefon){
  selectedTelefon=telefon;editNote=false;render();loadProgramari(telefon);
  if(isMobile())showContent();
}

function showContent(){
  document.getElementById("sidebar").style.display="none";
  document.getElementById("content").style.display="flex";
  document.getElementById("content").style.flexDirection="column";
  document.getElementById("back-btn").style.display="block";
}

function showSidebar(){
  document.getElementById("sidebar").style.display="flex";
  document.getElementById("content").style.display="none";
  document.getElementById("back-btn").style.display="none";
}

function goBack(){showSidebar();}

function getLocal(pac,key){return localState[pac.telefon]?.[key]!==undefined?localState[pac.telefon][key]:pac[key];}
function setLocal(telefon,key,val){if(!localState[telefon])localState[telefon]={};localState[telefon][key]=val;}

function getFiltrati(){
  const q=document.getElementById("search")?.value?.toLowerCase()||"";
  return pacienti.filter(p=>{
    const tip=(getLocal(p,"tip_serviciu")||"fizioterapie").toLowerCase();
    if(tip!==tabVal)return false;
    const ms=(p.nume||"").toLowerCase().includes(q)||(p.diagnostic||"").toLowerCase().includes(q)||(p.telefon||"").includes(q);
    const isUrgent=getLocal(p,"urgent");
    const sr=getLocal(p,"sedinte_ramase");
    // FIX: urgentii apar DOAR in filtrul "urgent", nu in "toti"
    const mf=filterVal==="toti"?!isUrgent:filterVal==="urgent"?isUrgent:sr===0;
    return ms&&mf;
  });
}

function render(){
  const filtrati=getFiltrati();
  const totiTab=pacienti.filter(p=>(getLocal(p,"tip_serviciu")||"fizioterapie")===tabVal);
  const urgenti=totiTab.filter(p=>getLocal(p,"urgent")).length;
  const finalizati=totiTab.filter(p=>getLocal(p,"sedinte_ramase")===0).length;

  document.getElementById("stats").innerHTML=
    `<span style="color:#f59e0b;font-weight:600">${urgenti}</span> urgente &middot; `+
    `<span style="color:#ef4444;font-weight:600">${finalizati}</span> fin. &middot; `+
    `<span style="color:#22c55e;font-weight:600">${totiTab.length}</span> total`;

  document.getElementById("list").innerHTML=filtrati.length===0
    ?`<div style="text-align:center;color:#27272a;margin-top:40px;font-size:13px">Niciun pacient găsit</div>`
    :filtrati.map(p=>{
      const isUrgent=getLocal(p,"urgent");
      const sr=getLocal(p,"sedinte_ramase");
      const dotC=dotColor(sr);
      return`<div class="pac-card ${p.telefon===selectedTelefon?'active':''}" onclick="selectPacient('${p.telefon}')">
        <div class="avatar">${initiale(p.nume)}</div>
        <div class="pac-info">
          <div class="pac-name">${p.nume}${isUrgent?' <span style="font-size:9px;color:#f59e0b;background:#27272a;padding:1px 6px;border-radius:8px;border:1px solid #3f3f46">URGENT</span>':''}</div>
          <div class="pac-diag">${p.diagnostic||'—'}</div>
        </div>
        <div class="dot" style="background:${dotC}"></div>
      </div>`;
    }).join("");

  if(!isMobile())renderProfil();
}

function renderProfil(){
  const pac=pacienti.find(p=>p.telefon===selectedTelefon);
  const content=document.getElementById("content");
  if(!pac){content.innerHTML=`<div id="empty">Selectează un pacient</div>`;return;}
  const sr=getLocal(pac,"sedinte_ramase");
  const isUrgent=getLocal(pac,"urgent");
  const noteVal=getLocal(pac,"note_terapeut");
  const tip=getLocal(pac,"tip_serviciu")||"fizioterapie";
  const programari=programariCache[pac.telefon]||[];
  const sc=dotColor(sr);
  const tipLabels={fizioterapie:"💆 Fizioterapie",kinetoterapie:"🏃 Kinetoterapie",evaluare:"📋 Evaluare"};
  const tipColors={fizioterapie:"active-fizio",kinetoterapie:"active-kineto",evaluare:"active-evaluare"};

  content.innerHTML=`<div id="profil">
    <div class="profil-header">
      <div class="avatar-lg">${initiale(pac.nume)}</div>
      <div style="flex:1;min-width:0;">
        <div class="profil-name">${pac.nume}</div>
        <div class="profil-sub">Ultima vizită: ${pac.ultima_vizita||'—'}</div>
        <span class="badge" style="background:#27272a;color:#71717a;border:1px solid #3f3f46">📞 ${pac.telefon}</span>
        <span class="badge" style="background:#1a0c3a;color:#c4b5fd;border:1px solid #2e1065">🦴 ${pac.diagnostic||'—'}</span>
      </div>
    </div>
    <div class="tip-selector">
      ${["fizioterapie","kinetoterapie","evaluare"].map(t=>`
        <button class="tip-btn ${tip===t?tipColors[t]:''}" onclick="schimbaTip('${t}')">${tipLabels[t]}</button>
      `).join("")}
    </div>
    <div class="urgent-toggle ${isUrgent?'on':''}" onclick="toggleUrgent()">
      <div class="toggle-switch ${isUrgent?'on':''}"><div class="toggle-knob"></div></div>
      <span class="urgent-label">${isUrgent?'⚠ Marcat ca URGENT':'Marchează ca urgent'}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
      <div class="card" style="margin:0">
        <div class="sedinte-row">
          <span class="card-label" style="margin:0">Ședințe</span>
          <span class="sedinte-num" style="color:${sc}">${sr}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(5,100-sr*10)}%;background:${sc}"></div></div>
        <div class="btn-row">
          <button class="btn-sm" onclick="schimbaSedinte(-1)">−</button>
          <button class="btn-sm" onclick="schimbaSedinte(1)">+</button>
        </div>
      </div>
      <div class="card" style="margin:0">
        <div class="card-label">Programări</div>
        ${programari.length===0
          ?`<div style="font-size:12px;color:#27272a">Se încarcă...</div>`
          :programari.slice(0,3).map(p=>`<div class="prog-row"><span class="prog-data">${p.data}</span><span class="prog-ora">${p.ora}</span></div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-header-row">
        <div class="card-label" style="margin:0">Note terapeut</div>
        <button class="btn-edit" onclick="toggleNote()">${editNote?'Anulează':'Editează'}</button>
      </div>
      ${editNote
        ?`<textarea class="note-edit" id="note-input">${noteVal||''}</textarea>`
        :`<p class="note-text">${noteVal||'<span style="color:#27272a">Nicio notă adăugată.</span>'}</p>`}
    </div>
    <button id="btn-save" onclick="salveaza()">Salvează modificările</button>
  </div>`;
}

function schimbaTip(tip){const pac=pacienti.find(p=>p.telefon===selectedTelefon);if(!pac)return;setLocal(pac.telefon,"tip_serviciu",tip);renderProfil();}
function toggleUrgent(){const pac=pacienti.find(p=>p.telefon===selectedTelefon);if(!pac)return;setLocal(pac.telefon,"urgent",!getLocal(pac,"urgent"));render();if(!isMobile())renderProfil();}
function schimbaSedinte(delta){const pac=pacienti.find(p=>p.telefon===selectedTelefon);if(!pac)return;setLocal(pac.telefon,"sedinte_ramase",Math.max(0,getLocal(pac,"sedinte_ramase")+delta));renderProfil();render();}
function toggleNote(){editNote=!editNote;renderProfil();}

async function salveaza(){
  const pac=pacienti.find(p=>p.telefon===selectedTelefon);if(!pac)return;
  const note=editNote?(document.getElementById("note-input")?.value||getLocal(pac,"note_terapeut")):getLocal(pac,"note_terapeut");
  const sr=getLocal(pac,"sedinte_ramase");
  const urgent=getLocal(pac,"urgent");
  const tip_serviciu=getLocal(pac,"tip_serviciu");
  if(editNote)setLocal(pac.telefon,"note_terapeut",note);
  try{
    await fetch(`${API}/pacienti/${encodeURIComponent(pac.telefon)}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({sedinte_ramase:sr,note_terapeut:note,urgent,tip_serviciu})});
    pac.sedinte_ramase=sr;pac.note_terapeut=note;pac.urgent=urgent;pac.tip_serviciu=tip_serviciu;
    editNote=false;
    const btn=document.getElementById("btn-save");
    btn.textContent="✓ Salvat";btn.classList.add("saved");
    setTimeout(()=>{btn.textContent="Salvează modificările";btn.classList.remove("saved");render();},2000);
  }catch(e){alert("Eroare: "+e.message);}
}

if(isMobile()){
  document.getElementById("content").style.display="none";
  document.getElementById("sidebar").style.display="flex";
}

loadPacienti();
</script>
</body>
</html>
