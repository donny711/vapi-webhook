<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juni Performance — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#020817;color:#e2e8f0;font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}
  input,textarea,button{font-family:'DM Sans',sans-serif;}input:focus,textarea:focus{outline:none;}

  #topbar{height:56px;border-bottom:1px solid #0f172a;display:flex;align-items:center;padding:0 24px;gap:16px;background:#020817;flex-shrink:0;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .logo-name{font-family:'Playfair Display',serif;font-size:16px;color:#f1f5f9;font-weight:700;}
  .logo-tag{font-size:11px;color:#334155;margin-left:4px;letter-spacing:1px;text-transform:uppercase;}
  #stats{margin-left:auto;font-size:12px;color:#475569;}

  #tabs{display:flex;gap:2px;padding:0 24px;background:#020817;border-bottom:1px solid #0f172a;flex-shrink:0;}
  .tab{padding:12px 20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#475569;border-bottom:2px solid transparent;transition:all 0.2s;}
  .tab:hover{color:#94a3b8;}
  .tab.active{color:#e2e8f0;border-bottom-color:#3b82f6;}

  #main{flex:1;display:flex;overflow:hidden;}
  #sidebar{width:300px;border-right:1px solid #0f172a;display:flex;flex-direction:column;flex-shrink:0;background:#020817;}
  #search-wrap{padding:16px 16px 8px;}
  #search{width:100%;padding:9px 14px;border-radius:10px;background:#0f172a;border:1px solid #1e293b;color:#e2e8f0;font-size:13px;}
  #filters{display:flex;gap:6px;padding:0 16px 12px;}
  .filter-btn{flex:1;padding:5px 0;border-radius:8px;font-size:11px;cursor:pointer;border:1px solid #1e293b;background:transparent;color:#475569;}
  .filter-btn.active{border-color:#334155;background:#1e293b;color:#e2e8f0;}
  #list{flex:1;overflow-y:auto;padding:0 8px 16px;}

  .pac-card{padding:14px 18px;border-radius:12px;cursor:pointer;border:1px solid transparent;transition:all 0.2s;display:flex;align-items:center;gap:12px;margin-bottom:2px;}
  .pac-card:hover{background:#0f172a40;}
  .pac-card.active{background:#0f172a;border-color:#334155;}
  .avatar{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#1e3a5f,#2d5986);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#93c5fd;font-family:'DM Mono',monospace;letter-spacing:1px;}
  .pac-info{flex:1;min-width:0;}
  .pac-name{font-size:14px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pac-diag{font-size:12px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  #content{flex:1;overflow-y:auto;background:#030d1a;}
  #profil{padding:32px 36px;}
  .profil-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;}
  .avatar-lg{width:64px;height:64px;border-radius:16px;flex-shrink:0;background:linear-gradient(135deg,#1e3a5f,#2d5986);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#93c5fd;font-family:'DM Mono',monospace;letter-spacing:2px;}
  .profil-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:4px;}
  .profil-sub{font-size:13px;color:#64748b;margin-bottom:10px;}
  .badge{font-size:12px;padding:4px 10px;border-radius:20px;display:inline-block;margin-right:8px;margin-bottom:4px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:18px 20px;}
  .card-label{font-size:12px;color:#94a3b8;margin-bottom:10px;font-family:'DM Mono',monospace;}
  .sedinte-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .sedinte-num{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;}
  .progress-bar{height:4px;background:#1e293b;border-radius:99px;overflow:hidden;margin-bottom:14px;}
  .progress-fill{height:100%;border-radius:99px;}
  .btn-row{display:flex;gap:8px;}
  .btn-sm{flex:1;padding:8px 0;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:18px;cursor:pointer;}
  .prog-row{display:flex;justify-content:space-between;margin-bottom:6px;}
  .prog-data{font-size:13px;color:#e2e8f0;}
  .prog-ora{font-size:13px;color:#22c55e;font-family:'DM Mono',monospace;}
  .note-text{font-size:13px;color:#94a3b8;line-height:1.7;}
  .note-edit{width:100%;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:13px;line-height:1.7;resize:vertical;min-height:80px;}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .btn-edit{font-size:12px;padding:4px 12px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;}
  #btn-save{width:100%;padding:13px 0;border-radius:12px;border:none;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s;margin-top:4px;}
  #btn-save.saved{background:#052e16;color:#22c55e;}
  #empty{display:flex;align-items:center;justify-content:center;height:100%;color:#334155;font-size:14px;}

  .urgent-toggle{display:flex;align-items:center;gap:10px;background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:14px 20px;margin-bottom:16px;cursor:pointer;transition:all 0.2s;}
  .urgent-toggle.on{border-color:#f59e0b;background:#1c1200;}
  .toggle-switch{width:40px;height:22px;border-radius:99px;background:#1e293b;position:relative;flex-shrink:0;transition:background 0.2s;}
  .toggle-switch.on{background:#f59e0b;}
  .toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left 0.2s;}
  .toggle-switch.on .toggle-knob{left:21px;}
  .urgent-label{font-size:13px;font-weight:600;color:#64748b;}
  .urgent-toggle.on .urgent-label{color:#f59e0b;}

  .tip-selector{display:flex;gap:8px;margin-bottom:16px;}
  .tip-btn{flex:1;padding:8px 0;border-radius:10px;border:1px solid #1e293b;background:transparent;color:#475569;font-size:12px;cursor:pointer;font-weight:500;transition:all 0.2s;}
  .tip-btn.active-fizio{border-color:#3b82f6;background:#0c1a3a;color:#93c5fd;}
  .tip-btn.active-kineto{border-color:#a78bfa;background:#1a0c3a;color:#c4b5fd;}
  .tip-btn.active-evaluare{border-color:#34d399;background:#0c2a1e;color:#6ee7b7;}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">
    <div class="logo-icon">🏥</div>
    <span class="logo-name">Juni Performance</span>
    <span class="logo-tag">CRM</span>
  </div>
  <div id="stats">Se încarcă...</div>
</div>

<div id="tabs">
  <button class="tab active" data-tip="fizioterapie" onclick="setTab('fizioterapie')">💆 Fizioterapie</button>
  <button class="tab" data-tip="kinetoterapie" onclick="setTab('kinetoterapie')">🏃 Kinetoterapie</button>
  <button class="tab" data-tip="evaluare" onclick="setTab('evaluare')">📋 Evaluări Inițiale</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="search-wrap"><input id="search" placeholder="Caută pacient..." oninput="render()"></div>
    <div id="filters">
      <button class="filter-btn active" data-f="toti" onclick="setFilter('toti')">Toți</button>
      <button class="filter-btn" data-f="urgent" onclick="setFilter('urgent')">⚠ Urgent</button>
      <button class="filter-btn" data-f="finalizat" onclick="setFilter('finalizat')">✓ Finalizat</button>
    </div>
    <div id="list"><div style="text-align:center;color:#475569;padding:20px;font-size:13px">Se încarcă...</div></div>
  </div>
  <div id="content"><div id="empty">Selectează un pacient</div></div>
</div>

<script>
const API=window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1"?"https://vapi-webhook-pcnp.onrender.com":"";
let pacienti=[],programariCache={},selectedTelefon=null,filterVal="toti",tabVal="fizioterapie",editNote=false,localState={};

function initiale(n){return(n||"?").split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();}
function dotColor(sr){return sr===0?"#ef4444":sr<=3?"#f59e0b":"#22c55e";}

async function loadPacienti(){
  try{
    const res=await fetch(`${API}/pacienti`);
    pacienti=await res.json();
    const first=pacienti.find(p=>(p.tip_serviciu||"fizioterapie")===tabVal);
    if(first){selectedTelefon=first.telefon;loadProgramari(first.telefon);}
    render();
  }catch(e){document.getElementById("list").innerHTML=`<div style="color:#ef4444;padding:16px;font-size:13px">Eroare: ${e.message}</div>`;}
}

async function loadProgramari(telefon){
  if(programariCache[telefon])return;
  try{const res=await fetch(`${API}/pacienti/${encodeURIComponent(telefon)}`);programariCache[telefon]=await res.json();if(selectedTelefon===telefon)renderProfil();}
  catch(e){programariCache[telefon]=[];}
}

function setTab(t){
  tabVal=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tip===t));
  const first=pacienti.find(p=>(getLocal(p,"tip_serviciu")||"fizioterapie")===t);
  selectedTelefon=first?first.telefon:null;
  editNote=false;
  render();
  if(selectedTelefon)loadProgramari(selectedTelefon);
}

function setFilter(f){filterVal=f;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.f===f));render();}
function selectPacient(telefon){selectedTelefon=telefon;editNote=false;render();loadProgramari(telefon);}
function getLocal(pac,key){return localState[pac.telefon]?.[key]!==undefined?localState[pac.telefon][key]:pac[key];}
function setLocal(telefon,key,val){if(!localState[telefon])localState[telefon]={};localState[telefon][key]=val;}

function getFiltrati(){
  const q=document.getElementById("search")?.value?.toLowerCase()||"";
  return pacienti.filter(p=>{
    const tip=(getLocal(p,"tip_serviciu")||"fizioterapie").toLowerCase();
    if(tip!==tabVal)return false;
    const ms=(p.nume||"").toLowerCase().includes(q)||(p.diagnostic||"").toLowerCase().includes(q)||(p.telefon||"").includes(q);
    const isUrgent=getLocal(p,"urgent");
    const sr=getLocal(p,"sedinte_ramase");
    const mf=filterVal==="toti"?true:filterVal==="urgent"?isUrgent:sr===0;
    return ms&&mf;
  });
}

function render(){
  const filtrati=getFiltrati();
  const totiTab=pacienti.filter(p=>(getLocal(p,"tip_serviciu")||"fizioterapie")===tabVal);
  const urgenti=totiTab.filter(p=>getLocal(p,"urgent")).length;
  const finalizati=totiTab.filter(p=>getLocal(p,"sedinte_ramase")===0).length;

  document.getElementById("stats").innerHTML=
    `<span style="color:#f59e0b;font-weight:600">${urgenti}</span> urgente &middot; `+
    `<span style="color:#ef4444;font-weight:600">${finalizati}</span> finalizate &middot; `+
    `<span style="color:#22c55e;font-weight:600">${totiTab.length}</span> în tab`;

  document.getElementById("list").innerHTML=filtrati.length===0
    ?`<div style="text-align:center;color:#334155;margin-top:40px;font-size:13px">Niciun pacient găsit</div>`
    :filtrati.map(p=>{
      const isUrgent=getLocal(p,"urgent");
      const sr=getLocal(p,"sedinte_ramase");
      const dotC=dotColor(sr);
      return`<div class="pac-card ${p.telefon===selectedTelefon?'active':''}" onclick="selectPacient('${p.telefon}')">
        <div class="avatar">${initiale(p.nume)}</div>
        <div class="pac-info">
          <div class="pac-name">${p.nume}${isUrgent?' <span style="font-size:10px;color:#f59e0b;background:#1c1200;padding:2px 6px;border-radius:10px;border:1px solid #f59e0b40">URGENT</span>':''}</div>
          <div class="pac-diag">${p.diagnostic||'—'}</div>
        </div>
        <div class="dot" style="background:${dotC};box-shadow:0 0 6px ${dotC}"></div>
      </div>`;
    }).join("");
  renderProfil();
}

function renderProfil(){
  const pac=pacienti.find(p=>p.telefon===selectedTelefon);
  const content=document.getElementById("content");
  if(!pac){content.innerHTML=`<div id="empty">Selectează un pacient</div>`;return;}
  const sr=getLocal(pac,"sedinte_ramase");
  const isUrgent=getLocal(pac,"urgent");
  const noteVal=getLocal(pac,"note_terapeut");
  const tip=getLocal(pac,"tip_serviciu")||"fizioterapie";
  const programari=programariCache[pac.telefon]||[];
  const sc=dotColor(sr);

  const tipLabels={fizioterapie:"💆 Fizioterapie",kinetoterapie:"🏃 Kinetoterapie",evaluare:"📋 Evaluare Inițială"};
  const tipColors={fizioterapie:"active-fizio",kinetoterapie:"active-kineto",evaluare:"active-evaluare"};

  content.innerHTML=`<div id="profil">
    <div class="profil-header">
      <div class="avatar-lg">${initiale(pac.nume)}</div>
      <div>
        <div class="profil-name">${pac.nume}</div>
        <div class="profil-sub">Ultima vizită: ${pac.ultima_vizita||'—'}</div>
        <span class="badge" style="background:#1e293b;color:#93c5fd;border:1px solid #1e3a5f">📞 ${pac.telefon}</span>
        <span class="badge" style="background:#1e293b;color:#a78bfa;border:1px solid #2e1065">🦴 ${pac.diagnostic||'—'}</span>
      </div>
    </div>

    <div class="tip-selector">
      ${["fizioterapie","kinetoterapie","evaluare"].map(t=>`
        <button class="tip-btn ${tip===t?tipColors[t]:''}" onclick="schimbaTip('${t}')">${tipLabels[t]}</button>
      `).join("")}
    </div>

    <div class="urgent-toggle ${isUrgent?'on':''}" onclick="toggleUrgent()">
      <div class="toggle-switch ${isUrgent?'on':''}"><div class="toggle-knob"></div></div>
      <span class="urgent-label">${isUrgent?'⚠ Pacient marcat ca URGENT':'Marchează ca urgent'}</span>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="sedinte-row">
          <span class="card-label" style="margin:0">ȘEDINȚE RĂMASE</span>
          <span class="sedinte-num" style="color:${sc}">${sr}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(5,100-sr*10)}%;background:${sc}"></div></div>
        <div class="btn-row">
          <button class="btn-sm" onclick="schimbaSedinte(-1)">−</button>
          <button class="btn-sm" onclick="schimbaSedinte(1)">+</button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">PROGRAMĂRI</div>
        ${programari.length===0?`<div style="font-size:13px;color:#475569">Se încarcă...</div>`:programari.slice(0,4).map(p=>`<div class="prog-row"><span class="prog-data">${p.data}</span><span class="prog-ora">${p.ora}</span></div>`).join("")}
      </div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <div class="card-label" style="margin:0">NOTE TERAPEUT</div>
        <button class="btn-edit" onclick="toggleNote()">${editNote?'Anulează':'Editează'}</button>
      </div>
      ${editNote?`<textarea class="note-edit" id="note-input">${noteVal||''}</textarea>`:`<p class="note-text">${noteVal||'<span style="color:#334155">Nicio notă adăugată.</span>'}</p>`}
    </div>

    <button id="btn-save" onclick="salveaza()">Salvează modificările</button>
  </div>`;
}

function schimbaTip(tip){
  const pac=pacienti.find(p=>p.telefon===selectedTelefon);
  if(!pac)return;
  setLocal(pac.telefon,"tip_serviciu",tip);
  renderProfil();
}
function toggleUrgent(){const pac=pacienti.find(p=>p.telefon===selectedTelefon);if(!pac)return;setLocal(pac.telefon,"urgent",!getLocal(pac,"urgent"));render();}
function schimbaSedinte(delta){const pac=pacienti.find(p=>p.telefon===selectedTelefon);if(!pac)return;setLocal(pac.telefon,"sedinte_ramase",Math.max(0,getLocal(pac,"sedinte_ramase")+delta));renderProfil();render();}
function toggleNote(){editNote=!editNote;renderProfil();}

async function salveaza(){
  const pac=pacienti.find(p=>p.telefon===selectedTelefon);if(!pac)return;
  const note=editNote?(document.getElementById("note-input")?.value||getLocal(pac,"note_terapeut")):getLocal(pac,"note_terapeut");
  const sr=getLocal(pac,"sedinte_ramase");
  const urgent=getLocal(pac,"urgent");
  const tip_serviciu=getLocal(pac,"tip_serviciu");
  if(editNote)setLocal(pac.telefon,"note_terapeut",note);
  try{
    await fetch(`${API}/pacienti/${encodeURIComponent(pac.telefon)}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({sedinte_ramase:sr,note_terapeut:note,urgent,tip_serviciu})});
    pac.sedinte_ramase=sr;pac.note_terapeut=note;pac.urgent=urgent;pac.tip_serviciu=tip_serviciu;
    editNote=false;
    const btn=document.getElementById("btn-save");
    btn.textContent="✓ Salvat în Sheets";btn.classList.add("saved");
    setTimeout(()=>{btn.textContent="Salvează modificările";btn.classList.remove("saved");render();},2000);
  }catch(e){alert("Eroare la salvare: "+e.message);}
}

loadPacienti();
</script>
</body>
</html>
